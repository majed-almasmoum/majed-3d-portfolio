<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>معرض الأعمال · 3D Portfolio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0f0f13;color:#f0ece4;min-height:100vh;direction:rtl}

/* ── Nav ── */
nav{background:#161620;border-bottom:1px solid rgba(255,255,255,.07);padding:0 24px;position:sticky;top:0;z-index:50}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-logo img{height:36px;object-fit:contain}
.nav-links{display:flex;gap:6px}
.nav-links a{padding:6px 16px;border-radius:8px;font-size:14px;color:rgba(255,255,255,.55);text-decoration:none;transition:all .15s}
.nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,.07);color:#f0ece4}
.admin-badge{font-size:11px;background:rgba(251,146,60,.15);border:1px solid rgba(251,146,60,.35);color:#fb923c;padding:3px 10px;border-radius:20px;margin-right:8px;display:none}

/* ── Page Header ── */
.page-header{max-width:1100px;margin:36px auto 28px;padding:0 20px}
.page-header h1{font-size:28px;font-weight:700;margin-bottom:6px}
.page-header p{color:rgba(255,255,255,.4);font-size:14px}

/* ── Filters ── */
.filters{max-width:1100px;margin:0 auto 28px;padding:0 20px;display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:6px 18px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.45);transition:all .15s}
.filter-btn.active,.filter-btn:hover{border-color:rgba(251,146,60,.5);background:rgba(251,146,60,.1);color:#fb923c}

/* ── Grid ── */
.works-grid{max-width:1100px;margin:0 auto;padding:0 20px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}
.empty-state{text-align:center;padding:80px 20px;color:rgba(255,255,255,.3)}
.empty-state .ei{font-size:48px;margin-bottom:12px}
.loading-state{max-width:1100px;margin:60px auto;padding:0 20px;text-align:center;color:rgba(255,255,255,.3);font-size:14px}

/* ── Work Card ── */
.work-card{background:#1a1a24;border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative}
.work-card:hover{transform:translateY(-3px);border-color:rgba(251,146,60,.3);box-shadow:0 10px 32px rgba(0,0,0,.4)}
.card-img{width:100%;height:210px;object-fit:cover;display:block;background:#111}
.card-img-placeholder{height:210px;display:flex;align-items:center;justify-content:center;background:#111;font-size:40px;opacity:.2}
.card-body{padding:14px 16px 16px}
.card-name{font-size:15px;font-weight:600;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:.03em}
.tag-mat{background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.25);color:#fb923c}
.tag-hrs{background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);color:#22d3ee}
.tag-col-none{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.45)}
.tag-col-printed{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:#4ade80}
.tag-col-painted{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);color:#a78bfa}
.card-img-count{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.65);color:#fff;font-size:11px;padding:3px 8px;border-radius:12px}

/* ── Admin Overlays on Card ── */
.card-delete{position:absolute;top:8px;right:8px;width:30px;height:30px;background:rgba(220,38,38,.85);border:none;color:#fff;border-radius:50%;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:background .15s;z-index:5}
.card-delete:hover{background:#dc2626}
body.admin-mode .card-delete{display:flex}
body.admin-mode .work-card{border-color:rgba(251,146,60,.2)}

/* ── FABs ── */
.fab{position:fixed;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .2s,opacity .2s;z-index:40}
.fab:hover{transform:scale(1.08)}
#fabAdd{bottom:88px;left:24px;width:52px;height:52px;background:linear-gradient(135deg,#fb923c,#f59e0b);color:#000;font-size:24px;font-weight:300;display:none}
body.admin-mode #fabAdd{display:flex}
#fabAdmin{bottom:24px;left:24px;width:48px;height:48px;background:#1e1e2e;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);font-size:18px}
body.admin-mode #fabAdmin{border-color:rgba(251,146,60,.5);color:#fb923c;background:rgba(251,146,60,.1)}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#161620;border:1px solid rgba(255,255,255,.1);border-radius:16px;width:100%;padding:28px;max-height:90vh;overflow-y:auto}
.modal-sm{max-width:380px}
.modal-lg{max-width:540px}
.modal-box h3{font-size:18px;margin-bottom:8px}
.modal-box .sub{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:24px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.07)}
.modal-header h3{margin:0;font-size:18px}
.modal-header button{background:transparent;border:none;color:rgba(255,255,255,.4);font-size:18px;cursor:pointer;padding:4px 8px}
.modal-header button:hover{color:#f0ece4}

/* ── Form ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.form-full{grid-column:1/-1}
label{display:block;font-size:12px;color:rgba(255,255,255,.4);margin-bottom:5px;letter-spacing:.04em}
input[type=text],input[type=number],input[type=password],select,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;color:#f0ece4;font-size:14px;font-family:inherit;outline:none}
input:focus,select:focus,textarea:focus{border-color:rgba(251,146,60,.45);box-shadow:0 0 0 3px rgba(251,146,60,.08)}
select option{background:#1a1a25}
textarea{resize:vertical}
.cbtn-group{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.cbtn{padding:7px 13px;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:rgba(255,255,255,.5);transition:all .15s}
.cbtn.active{border-color:rgba(251,146,60,.55);background:rgba(251,146,60,.12);color:#fb923c}

/* ── Drop Zone ── */
.drop-zone{border:2px dashed rgba(255,255,255,.1);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px}
.drop-zone:hover,.drop-zone.drag{border-color:rgba(251,146,60,.55);background:rgba(251,146,60,.04)}
.drop-zone .dz-icon{font-size:32px;margin-bottom:8px}
.drop-zone strong{display:block;font-size:14px;color:rgba(255,255,255,.65);margin-bottom:4px}
.drop-zone p{font-size:12px;color:rgba(255,255,255,.35)}

/* ── Previews ── */
.previews{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:0}
.prev-item{position:relative;width:80px;height:80px}
.prev-item img{width:100%;height:100%;object-fit:cover;border-radius:8px;border:1px solid rgba(255,255,255,.1)}
.prev-item button{position:absolute;top:-6px;right:-6px;background:#ef4444;border:none;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── Progress ── */
.progress-wrap{margin:12px 0}
.progress-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#fb923c,#f59e0b);border-radius:3px;transition:width .3s;width:0%}
.progress-text{font-size:12px;color:rgba(255,255,255,.4);margin-top:6px}

/* ── Buttons ── */
.btn-row{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-family:inherit;cursor:pointer;border:none;font-weight:600;transition:opacity .15s}
.btn-primary{background:linear-gradient(135deg,#fb923c,#f59e0b);color:#000}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:rgba(255,255,255,.05);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.1)}
.err-text{color:#f87171;font-size:12px;margin-top:10px;text-align:center}

/* ── Lightbox ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:center;justify-content:center}
.lb-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;z-index:10;transition:background .15s}
.lb-close:hover{background:rgba(255,255,255,.2)}
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:24px;cursor:pointer;z-index:10;transition:background .15s;line-height:1}
.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,.2)}
.lb-prev{right:20px}
.lb-next{left:20px}
.lb-content{display:flex;flex-direction:column;align-items:center;max-width:min(90vw,800px);width:100%;padding:0 70px}
#lbImg{max-width:100%;max-height:70vh;object-fit:contain;border-radius:8px;display:block}
.lb-info{margin-top:16px;text-align:center;width:100%}
.lb-name{font-size:18px;font-weight:700;margin-bottom:8px}
.lb-tags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.lb-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.4);background:rgba(0,0,0,.5);padding:4px 12px;border-radius:12px}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:50%;transform:translateX(50%) translateY(80px);background:#1e1e2e;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 22px;font-size:13px;transition:transform .3s;z-index:300;pointer-events:none}
#toast.show{transform:translateX(50%) translateY(0)}
#toast.ok{border-color:rgba(74,222,128,.4);color:#4ade80}
#toast.err{border-color:rgba(248,113,113,.4);color:#f87171}

@media(max-width:600px){
.form-grid{grid-template-columns:1fr}
.lb-content{padding:0 60px}
.works-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
}
</style>

</head>

<script>
// ────────────────────────────────────────────────────────
//  State
// ────────────────────────────────────────────────────────
let works        = [];
let activeFilter = 'all';
let adminMode    = false;
let adminPw      = sessionStorage.getItem('adminPw') || '';
let selectedFiles = [];
let colorMethod  = 'none';
let lbWork       = null;
let lbIdx        = 0;

const COLOR_LABELS = { none:'بدون تلوين', printed:'طُبع ملون 🎨', painted:'لُوّن يدوياً 🖌️' };
const COLOR_TAG    = { none:'tag-col-none', printed:'tag-col-printed', painted:'tag-col-painted' };

// ────────────────────────────────────────────────────────
//  Init
// ────────────────────────────────────────────────────────
async function init() {
  if (adminPw) {
    const ok = await verifyPw(adminPw);
    if (ok) enterAdminMode();
  }
  await loadWorks();
}

// ────────────────────────────────────────────────────────
//  API helpers
// ────────────────────────────────────────────────────────
async function apiFetch(path, body) {
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPw },
    body: JSON.stringify(body),
  });
  return res.json();
}

async function verifyPw(pw) {
  try {
    const res = await fetch('/api/verify-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': pw },
    });
    return res.ok;
  } catch { return false; }
}

// ────────────────────────────────────────────────────────
//  Load & Render
// ────────────────────────────────────────────────────────
async function loadWorks() {
  try {
    const res = await fetch('/api/get-works');
    works = await res.json();
  } catch { works = []; }
  renderAll();
}

function renderAll() {
  const filtered = activeFilter === 'all' ? works : works.filter(w => w.material === activeFilter);

  // Count text
  document.getElementById('worksCount').textContent = `${works.length} عمل مطبوع`;

  // Filters
  const mats = [...new Set(works.map(w => w.material).filter(Boolean))];
  const fEl  = document.getElementById('filters');
  if (works.length > 1) {
    fEl.style.display = 'flex';
    fEl.innerHTML = ['all', ...mats].map(m =>
      `<button class="filter-btn${activeFilter===m?' active':''}" onclick="setFilter('${m}')">${m==='all'?'الكل (' + works.length + ')':m}</button>`
    ).join('');
  }

  document.getElementById('loadingState').style.display = 'none';

  if (filtered.length === 0) {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('grid').style.display = 'none';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('grid').style.display = 'grid';

  document.getElementById('grid').innerHTML = filtered.map(w => {
    const img = w.images && w.images.length > 0
      ? `<img class="card-img" src="${w.images[0]}" alt="${w.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="card-img-placeholder" style="display:none">🖨️</div>`
      : `<div class="card-img-placeholder">🖨️</div>`;
    const multiCount = w.images && w.images.length > 1
      ? `<div class="card-img-count">📷 ${w.images.length}</div>` : '';
    const hrs = w.printHours && w.printHours !== '—' ? `<span class="tag tag-hrs">⏱ ${w.printHours}h</span>` : '';
    const col = w.colorMethod ? `<span class="tag ${COLOR_TAG[w.colorMethod]||'tag-col-none'}">${COLOR_LABELS[w.colorMethod]||w.colorMethod}</span>` : '';
    return `
      <div class="work-card" onclick="openLightbox(${w.id},0)">
        ${img}${multiCount}
        <button class="card-delete" onclick="event.stopPropagation();deleteWork(${w.id})" title="حذف">✕</button>
        <div class="card-body">
          <div class="card-name">${w.name || 'بدون عنوان'}</div>
          <div class="card-tags">
            ${w.material?`<span class="tag tag-mat">${w.material}</span>`:''}
            ${hrs}${col}
          </div>
        </div>
      </div>`;
  }).join('');
}

function setFilter(m) { activeFilter = m; renderAll(); }

// ────────────────────────────────────────────────────────
//  Admin
// ────────────────────────────────────────────────────────
function toggleAdmin() {
  if (adminMode) { exitAdminMode(); return; }
  if (adminPw) { enterAdminMode(); return; }
  openModal('pwModal');
  setTimeout(() => document.getElementById('pwInput').focus(), 100);
}

async function submitPw() {
  const val = document.getElementById('pwInput').value.trim();
  if (!val) return;
  const btn = document.getElementById('pwBtn');
  btn.disabled = true; btn.textContent = '...';
  const ok = await verifyPw(val);
  btn.disabled = false; btn.textContent = 'دخول';
  if (ok) {
    adminPw = val;
    sessionStorage.setItem('adminPw', val);
    document.getElementById('pwErr').style.display = 'none';
    closeModal('pwModal');
    document.getElementById('pwInput').value = '';
    enterAdminMode();
  } else {
    document.getElementById('pwErr').style.display = 'block';
  }
}

function enterAdminMode() {
  adminMode = true;
  document.body.classList.add('admin-mode');
  document.getElementById('adminBadge').style.display = 'inline-block';
  document.getElementById('fabAdmin').title = 'إيقاف وضع الإدارة';
}

function exitAdminMode() {
  adminMode = false;
  document.body.classList.remove('admin-mode');
  document.getElementById('adminBadge').style.display = 'none';
  document.getElementById('fabAdmin').title = 'وضع الإدارة';
  adminPw = '';
  sessionStorage.removeItem('adminPw');
}

// ────────────────────────────────────────────────────────
//  Add Work
// ────────────────────────────────────────────────────────
function showAddModal() {
  resetForm();
  openModal('addModal');
}

function resetForm() {
  selectedFiles = []; colorMethod = 'none';
  document.getElementById('fName').value = '';
  document.getElementById('fHours').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fMaterial').value = 'PLA';
  document.getElementById('imgInput').value = '';
  document.getElementById('previews').innerHTML = '';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
  document.querySelectorAll('.cbtn').forEach(b => b.classList.toggle('active', b.dataset.val === 'none'));
  document.getElementById('saveBtn').disabled = false;
}

// Drag & Drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', ()=> dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); handleFiles(e.dataTransfer.files); });

function handleFiles(files) {
  Array.from(files).filter(f => f.type.startsWith('image/')).forEach(file => {
    resizeImage(file).then(({ base64, dataUrl }) => {
      selectedFiles.push({ file, base64, dataUrl, name: file.name });
      renderPreviews();
    });
  });
}

function resizeImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 1920;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h * MAX / w); w = MAX; } else { w = Math.round(w * MAX / h); h = MAX; } }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = c.toDataURL('image/jpeg', 0.85);
      URL.revokeObjectURL(url);
      resolve({ base64: dataUrl.split(',')[1], dataUrl });
    };
    img.src = url;
  });
}

function renderPreviews() {
  document.getElementById('previews').innerHTML = selectedFiles.map((f, i) => `
    <div class="prev-item">
      <img src="${f.dataUrl}" alt="">
      <button onclick="removeFile(${i})">✕</button>
    </div>`).join('');
}

function removeFile(i) { selectedFiles.splice(i, 1); renderPreviews(); }
function setColor(btn) {
  document.querySelectorAll('.cbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); colorMethod = btn.dataset.val;
}

async function saveWork() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { toast('أدخل اسم المجسم', 'err'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  document.getElementById('progressWrap').style.display = 'block';

  const total = selectedFiles.length + 1;
  let done = 0;
  setProgress(0, 'جاري البدء...');

  // Upload images
  const imagePaths = [];
  for (const f of selectedFiles) {
    const ext = f.file.name.split('.').pop().toLowerCase() || 'jpg';
    const filename = `${Date.now()}_${Math.random().toString(36).slice(2,6)}.${ext}`;
    setProgress(Math.round(done/total*100), `رفع صورة ${done+1} من ${selectedFiles.length}...`);
    const res = await apiFetch('/api/upload', { filename, content: f.base64 });
    if (res.error) { toast('خطأ في رفع الصورة: ' + res.error, 'err'); btn.disabled=false; return; }
    imagePaths.push(res.path);
    done++;
  }

  // Save work
  setProgress(Math.round(done/total*100), 'حفظ العمل...');
  const work = {
    name,
    material:    document.getElementById('fMaterial').value,
    printHours:  document.getElementById('fHours').value || '—',
    colorMethod,
    description: document.getElementById('fDesc').value.trim(),
    images:      imagePaths,
  };

  const res = await apiFetch('/api/save-work', { work });
  if (res.error) { toast('خطأ في الحفظ: ' + res.error, 'err'); btn.disabled=false; return; }

  setProgress(100, 'تم! ⟳ قد يستغرق ظهوره دقيقة...');
  toast(`تم إضافة "${name}" بنجاح ✓`, 'ok');

  // Optimistic UI: add to local works
  works.unshift({ ...work, id: res.id, addedAt: new Date().toISOString() });
  renderAll();

  setTimeout(() => { closeModal('addModal'); }, 1200);
}

function setProgress(pct, text) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
}

// ────────────────────────────────────────────────────────
//  Delete Work
// ────────────────────────────────────────────────────────
async function deleteWork(id) {
  const w = works.find(x => x.id === id);
  if (!confirm(`حذف "${w ? w.name : 'هذا العمل'}"؟`)) return;
  const res = await apiFetch('/api/delete-work', { id });
  if (res.error) { toast('خطأ: ' + res.error, 'err'); return; }
  works = works.filter(x => x.id !== id);
  renderAll();
  toast('تم الحذف ✓', 'ok');
}

// ────────────────────────────────────────────────────────
//  Lightbox
// ────────────────────────────────────────────────────────
function openLightbox(id, idx) {
  lbWork = works.find(w => w.id === id);
  if (!lbWork) return;
  lbIdx = idx || 0;
  updateLightbox();
  document.getElementById('lightbox').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function updateLightbox() {
  const imgs = lbWork.images || [];
  document.getElementById('lbImg').src = imgs[lbIdx] || '';
  document.getElementById('lbName').textContent = lbWork.name || '';
  const col = lbWork.colorMethod ? `<span class="tag ${COLOR_TAG[lbWork.colorMethod]||''}">${COLOR_LABELS[lbWork.colorMethod]||''}</span>` : '';
  const hrs = lbWork.printHours && lbWork.printHours !== '—' ? `<span class="tag tag-hrs">⏱ ${lbWork.printHours}h</span>` : '';
  document.getElementById('lbTags').innerHTML =
    (lbWork.material ? `<span class="tag tag-mat">${lbWork.material}</span>` : '') + hrs + col;
  const hasMult = imgs.length > 1;
  document.querySelector('.lb-prev').style.display = hasMult ? 'flex' : 'none';
  document.querySelector('.lb-next').style.display = hasMult ? 'flex' : 'none';
  document.getElementById('lbCounter').textContent = hasMult ? `${lbIdx+1} / ${imgs.length}` : '';
}

function lbNav(dir) {
  const len = (lbWork.images || []).length;
  lbIdx = (lbIdx + dir + len) % len;
  updateLightbox();
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
  document.body.style.overflow = '';
}

function lbOverlayClose(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox').style.display !== 'none') {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft')  lbNav(1);
    if (e.key === 'ArrowRight') lbNav(-1);
  }
  if (e.key === 'Escape') { closeModal('addModal'); closeModal('pwModal'); }
});

// ────────────────────────────────────────────────────────
//  Modal helpers
// ────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function overlayClose(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

// ────────────────────────────────────────────────────────
//  Toast
// ────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3500);
}

// ── Start ──
init();
</script>
